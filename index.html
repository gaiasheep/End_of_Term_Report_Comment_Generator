<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>期末评语生成器</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0f7f4;color:#2d3748;min-height:100vh;padding:20px}
  .container{max-width:760px;margin:0 auto}
  h1{text-align:center;font-size:1.5rem;font-weight:700;color:#2c7a5c;margin-bottom:18px;letter-spacing:.5px}
  h1 span{font-size:.9rem;color:#68a88b;font-weight:400;display:block;margin-top:4px}

  /* API Config */
  .api-panel{background:#fff;border:2px solid #b2dfcd;border-radius:14px;margin-bottom:18px;overflow:hidden}
  .api-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;background:#e8f5ef;user-select:none}
  .api-header h2{font-size:.95rem;color:#2c7a5c;font-weight:600}
  .api-header .arrow{transition:transform .3s;font-size:1.1rem;color:#2c7a5c}
  .api-body{padding:14px 16px;display:none;gap:10px;flex-direction:column}
  .api-body.open{display:flex}
  .api-row{display:flex;flex-direction:column;gap:4px}
  .api-row label{font-size:.8rem;color:#4a7c65;font-weight:600}
  .api-row input{border:1.5px solid #b2dfcd;border-radius:8px;padding:8px 10px;font-size:.85rem;outline:none;transition:border .2s}
  .api-row input:focus{border-color:#2c7a5c}
  .save-btn{align-self:flex-end;background:#2c7a5c;color:#fff;border:none;border-radius:8px;padding:7px 18px;font-size:.85rem;cursor:pointer;transition:background .2s;position:relative;z-index:10}
  .save-btn:hover{background:#235f47}

  /* Card */
  .card{background:#fff;border-radius:14px;padding:18px;margin-bottom:14px;box-shadow:0 2px 8px rgba(44,122,92,.08)}
  .card h3{font-size:.9rem;font-weight:700;color:#2c7a5c;margin-bottom:12px;display:flex;align-items:center;gap:6px}

  /* Role toggle */
  .role-group{display:flex;gap:10px}
  .role-btn{flex:1;padding:10px;border:2px solid #b2dfcd;border-radius:10px;background:#fff;color:#4a7c65;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .2s;text-align:center}
  .role-btn.active{background:#2c7a5c;border-color:#2c7a5c;color:#fff}

  /* Form */
  .form-row{display:flex;gap:12px;flex-wrap:wrap}
  .form-group{display:flex;flex-direction:column;gap:5px;flex:1;min-width:140px}
  .form-group label{font-size:.8rem;color:#4a7c65;font-weight:600}
  .form-group input,.form-group select{border:1.5px solid #b2dfcd;border-radius:8px;padding:8px 10px;font-size:.85rem;outline:none;transition:border .2s;background:#fff}
  .form-group input:focus,.form-group select:focus{border-color:#2c7a5c}

  /* Radio inline */
  .radio-group{display:flex;gap:8px}
  .radio-label{display:flex;align-items:center;gap:5px;cursor:pointer;font-size:.85rem;padding:7px 12px;border:1.5px solid #b2dfcd;border-radius:8px;transition:all .2s;background:#fff}
  .radio-label:hover{border-color:#2c7a5c}
  .radio-label input{accent-color:#2c7a5c}
  .radio-label.active-radio{background:#e8f5ef;border-color:#2c7a5c;color:#2c7a5c;font-weight:600}

  /* Tags */
  .tags{display:flex;flex-wrap:wrap;gap:8px;align-items:flex-start}
  .tag{padding:6px 13px;border-radius:20px;border:1.5px solid #b2dfcd;background:#fff;font-size:.82rem;cursor:pointer;transition:all .2s;color:#4a7c65;user-select:none;display:inline-block;white-space:nowrap}
  .tag:hover{border-color:#2c7a5c;background:#e8f5ef}
  .tag.selected.strength{background:#2c7a5c;border-color:#2c7a5c;color:#fff}
  .tag.selected.improve{background:#e07b54;border-color:#e07b54;color:#fff}

  /* Generate button */
  .gen-btn{width:100%;padding:14px;background:linear-gradient(135deg,#2c7a5c,#3aa876);color:#fff;border:none;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.5px;margin-top:4px}
  .gen-btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 4px 14px rgba(44,122,92,.35)}
  .gen-btn:disabled{background:#9dc9b8;cursor:not-allowed;transform:none}

  /* Output */
  .output-box{width:100%;min-height:120px;border:1.5px solid #b2dfcd;border-radius:10px;padding:14px;font-size:.9rem;line-height:1.7;resize:vertical;outline:none;color:#2d3748;font-family:inherit;background:#fafffe}
  .output-box:focus{border-color:#2c7a5c}
  .copy-btn{margin-top:10px;padding:8px 20px;background:#fff;border:1.5px solid #2c7a5c;color:#2c7a5c;border-radius:8px;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .2s}
  .copy-btn:hover{background:#e8f5ef}
  .copy-btn.copied{background:#2c7a5c;color:#fff}

  .status{font-size:.8rem;margin-top:6px;min-height:18px;color:#e07b54}
  .loading-dots::after{content:'...';animation:dots 1.2s steps(4,end) infinite}
  @keyframes dots{0%,100%{content:''}25%{content:'.'}50%{content:'..'}75%{content:'...'}}

  .trend-group{display:flex;gap:6px;flex-wrap:wrap}
  .trend-btn{padding:6px 12px;border:1.5px solid #b2dfcd;border-radius:8px;background:#fff;font-size:.82rem;cursor:pointer;color:#4a7c65;transition:all .2s}
  .trend-btn.active{background:#5b9bd5;border-color:#5b9bd5;color:#fff}

  .tip{font-size:.75rem;color:#999;margin-top:6px}

  @media(max-width:500px){
    .form-row{flex-direction:column}
    .role-group{flex-direction:column}
  }
</style>
</head>
<body>
<div class="container">
  <h1>📝 期末评语全自动生成器<span>End-of-Term Report Comment Generator</span></h1>

  <!-- API Config -->
  <div class="api-panel">
    <div class="api-header" onclick="toggleApi()">
      <h2>⚙️ API 配置 &nbsp;<small style="color:#888;font-weight:400">（点击展开/收起）</small></h2>
      <span class="arrow" id="arrow">▼</span>
    </div>
    <div class="api-body" id="apiBody">
      <div class="api-row">
        <label>🔑 API Key</label>
        <input type="password" id="apiKey" placeholder="sk-..." autocomplete="off">
      </div>
      <div class="api-row">
        <label>🌐 Base URL</label>
        <input type="text" id="baseUrl" placeholder="https://api.openai.com/v1/chat/completions">
      </div>
      <div class="api-row">
        <label>🤖 Model Name</label>
        <input type="text" id="modelName" placeholder="gpt-4o-mini">
      </div>
      <button class="save-btn" onclick="saveConfig()">💾 保存配置</button>
      <div class="tip">配置已自动保存至本地，无需重复输入。</div>
    </div>
  </div>

  <!-- Role -->
  <div class="card">
    <h3>👤 教师角色</h3>
    <div class="role-group">
      <div class="role-btn active" id="role-ht" onclick="setRole('ht')">🏫 班主任<br><small>Homeroom Teacher</small></div>
      <div class="role-btn" id="role-ict" onclick="setRole('ict')">💻 ICT学科老师<br><small>ICT Teacher</small></div>
    </div>
  </div>

  <!-- Basic Info -->
  <div class="card">
    <h3>📋 基础信息</h3>
    <div class="form-row">
      <div class="form-group">
        <label>学生姓名 Student Name</label>
        <input type="text" id="stuName" placeholder="e.g. Alex Chen">
      </div>
      <div class="form-group">
        <label>字数限制 Word Count</label>
        <input type="number" id="wordCount" value="100" min="50" max="300">
      </div>
    </div>
    <div style="margin-top:12px">
      <label style="font-size:.8rem;color:#4a7c65;font-weight:600;display:block;margin-bottom:6px">性别 Gender</label>
      <div class="radio-group" id="genderGroup">
        <label class="radio-label active-radio"><input type="radio" name="gender" value="male" checked> 男 He/Him</label>
        <label class="radio-label"><input type="radio" name="gender" value="female"> 女 She/Her</label>
      </div>
    </div>
  </div>

  <!-- Academic -->
  <div class="card">
    <h3>📊 成绩与学业表现</h3>
    <div class="form-row">
      <div class="form-group">
        <label>考试成绩 / 等第</label>
        <select id="grade">
          <option value="">-- 请选择 --</option>
          <option value="A+">A+ (优秀 Excellent)</option>
          <option value="A">A (优良 Very Good)</option>
          <option value="B">B (良好 Good)</option>
          <option value="C">C (及格 Satisfactory)</option>
          <option value="D">D (需改进 Needs Improvement)</option>
        </select>
      </div>
    </div>
    <div style="margin-top:12px">
      <label style="font-size:.8rem;color:#4a7c65;font-weight:600;display:block;margin-bottom:6px">学业趋势 Academic Trend</label>
      <div class="trend-group">
        <button class="trend-btn active" id="trend-up" onclick="setTrend('up')">📈 进步明显</button>
        <button class="trend-btn" id="trend-stable" onclick="setTrend('stable')">➡️ 稳定保持</button>
        <button class="trend-btn" id="trend-down" onclick="setTrend('down')">📉 有所下滑</button>
      </div>
    </div>
  </div>

  <!-- Strengths -->
  <div class="card">
    <h3>⭐ 优点标签 <small style="color:#888;font-weight:400">（可多选）</small></h3>
    <div class="tags" id="strengthTags">
      <span class="tag strength" onclick="toggleTag(this,'strength')">思维敏捷</span>
      <span class="tag strength" onclick="toggleTag(this,'strength')">课堂专注</span>
      <span class="tag strength" onclick="toggleTag(this,'strength')">乐于助人</span>
      <span class="tag strength" onclick="toggleTag(this,'strength')">有责任心</span>
      <span class="tag strength" onclick="toggleTag(this,'strength')">动手能力强</span>
      <span class="tag strength" onclick="toggleTag(this,'strength')">积极发言</span>
      <span class="tag strength" onclick="toggleTag(this,'strength')">踏实稳重</span>
    </div>
  </div>

  <!-- Improvements -->
  <div class="card">
    <h3>🔧 有待提升 <small style="color:#888;font-weight:400">（可多选）</small></h3>
    <div class="tags" id="improveTags">
      <span class="tag improve" onclick="toggleTag(this,'improve')">粗心大意</span>
      <span class="tag improve" onclick="toggleTag(this,'improve')">课堂易分心</span>
      <span class="tag improve" onclick="toggleTag(this,'improve')">自主性需提高</span>
      <span class="tag improve" onclick="toggleTag(this,'improve')">发言不够积极</span>
      <span class="tag improve" onclick="toggleTag(this,'improve')">书写不够规范</span>
    </div>
  </div>

  <!-- Generate -->
  <button class="gen-btn" id="genBtn" onclick="generate()">✨ 智能生成评语</button>
  <div class="status" id="status"></div>

  <!-- Output -->
  <div class="card" id="outputCard" style="display:none;margin-top:14px">
    <h3>📄 生成结果</h3>
    <textarea class="output-box" id="outputBox" readonly></textarea>
    <button class="copy-btn" id="copyBtn" onclick="copyText()">📋 一键复制</button>
  </div>
</div>

<script>
// ---- State ----
let role = 'ht';
let trend = 'up';

// ---- Init: load config ----
window.onload = () => {
  try {
    const cfg = JSON.parse(localStorage.getItem('reportGenConfig') || '{}');
    document.getElementById('apiKey').value = cfg.apiKey || 'sk-b2e191b1d4544fbabb0bc3b181962aef';
    document.getElementById('baseUrl').value = cfg.baseUrl || 'https://api.deepseek.com/v1/chat/completions';
    document.getElementById('modelName').value = cfg.modelName || 'deepseek-chat';
  } catch(e) {
    document.getElementById('baseUrl').value = 'https://api.openai.com/v1/chat/completions';
    document.getElementById('modelName').value = 'gpt-4o-mini';
  }
  // radio highlight sync
  document.querySelectorAll('input[name="gender"]').forEach(r => {
    r.addEventListener('change', () => {
      document.querySelectorAll('.radio-label').forEach(l => l.classList.remove('active-radio'));
      r.closest('.radio-label').classList.add('active-radio');
    });
  });
};

function toggleApi() {
  const body = document.getElementById('apiBody');
  const arrow = document.getElementById('arrow');
  body.classList.toggle('open');
  arrow.textContent = body.classList.contains('open') ? '▲' : '▼';
}

function saveConfig() {
  const cfg = {
    apiKey: document.getElementById('apiKey').value.trim(),
    baseUrl: document.getElementById('baseUrl').value.trim(),
    modelName: document.getElementById('modelName').value.trim()
  };
  try { localStorage.setItem('reportGenConfig', JSON.stringify(cfg)); } catch(e){}
  const btn = document.querySelector('.save-btn');
  btn.textContent = '✅ 已保存！'; 
  setTimeout(() => btn.textContent = '💾 保存配置', 1500);
}

function setRole(r) {
  role = r;
  document.getElementById('role-ht').classList.toggle('active', r === 'ht');
  document.getElementById('role-ict').classList.toggle('active', r === 'ict');
}

function setTrend(t) {
  trend = t;
  ['up','stable','down'].forEach(x => document.getElementById('trend-'+x).classList.toggle('active', x===t));
}

function toggleTag(el, type) {
  el.classList.toggle('selected');
}

function getSelected(containerId) {
  return [...document.querySelectorAll('#'+containerId+' .tag.selected')].map(t => t.textContent);
}

async function generate() {
  const apiKey = document.getElementById('apiKey').value.trim();
  const baseUrl = document.getElementById('baseUrl').value.trim() || 'https://api.openai.com/v1/chat/completions';
  const modelName = document.getElementById('modelName').value.trim() || 'gpt-4o-mini';
  const name = document.getElementById('stuName').value.trim() || 'the student';
  const wordCount = document.getElementById('wordCount').value || '100';
  const gender = document.querySelector('input[name="gender"]:checked').value;
  const grade = document.getElementById('grade').value;
  const strengths = getSelected('strengthTags');
  const improvements = getSelected('improveTags');

  if (!apiKey) {
    setStatus('❗ 请先在顶部填写 API Key 并保存。', true);
    document.getElementById('apiBody').classList.add('open');
    document.getElementById('arrow').textContent = '▲';
    return;
  }

  const pronoun = gender === 'male' ? 'He/Him/His' : 'She/Her/Hers';
  const pronoun3 = gender === 'male' ? 'He' : 'She';

  const roleDesc = role === 'ht'
    ? 'Homeroom Teacher (班主任), writing a holistic end-of-term comment covering overall character, attitude, and academic performance'
    : 'ICT Subject Teacher, writing a subject-specific end-of-term comment focused on ICT skills, digital literacy, project work, and classroom engagement';

  const trendMap = { up: 'showing clear improvement', stable: 'maintaining consistent performance', down: 'experiencing a slight decline in performance' };
  const gradeInfo = grade ? `Exam grade/level: ${grade}. Academic trend: ${trendMap[trend]}.` : `Academic trend: ${trendMap[trend]}.`;

  const strengthStr = strengths.length ? strengths.join('、') : '（未选择）';
  const improveStr = improvements.length ? improvements.join('、') : '（未选择）';

  const prompt = `You are a professional teacher at an international school. Write an end-of-term report comment for a student.

STRICT RULES:
1. Write ONLY in English. No Chinese. No prefixes, labels, or explanations.
2. Keep it to approximately ${wordCount} words.
3. Use the correct pronouns: ${pronoun} (${pronoun3}).
4. Structure: 
   a) Acknowledge academic performance using the grade and trend data — rephrase naturally and professionally.
   b) Highlight strengths (from the list) with polished, specific language.
   c) Diplomatically suggest areas for improvement.
   d) End with an encouraging forward-looking statement about next term.
5. Sound warm, professional, and specific — like a real international school report.

STUDENT DATA:
- Name: ${name}
- Teacher role: ${roleDesc}
- ${gradeInfo}
- Strengths (中文标签, rephrase naturally in English): ${strengthStr}
- Areas for improvement (中文标签, rephrase diplomatically in English): ${improveStr}

Now write the comment directly (no preamble):`;

  // UI: loading
  const btn = document.getElementById('genBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="loading-dots">⏳ 生成中</span>';
  setStatus('正在调用 AI，请稍候...', false);

  try {
    const response = await fetch(baseUrl, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${apiKey}`,
        'Accept': 'application/json'
      },
      body: JSON.stringify({
        model: modelName,
        max_tokens: 400,
        temperature: 0.75,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    if (!response.ok) {
      let errMsg = `HTTP ${response.status}`;
      try { const e = await response.json(); errMsg = e?.error?.message || errMsg; } catch(e){}
      throw new Error(errMsg);
    }

    const data = await response.json();
    const text = data?.choices?.[0]?.message?.content?.trim();
    if (!text) throw new Error('Empty response from API.');

    document.getElementById('outputBox').value = text;
    document.getElementById('outputCard').style.display = 'block';
    document.getElementById('copyBtn').textContent = '📋 一键复制';
    document.getElementById('copyBtn').classList.remove('copied');
    document.getElementById('outputCard').scrollIntoView({ behavior: 'smooth' });
    setStatus('✅ 生成成功！', false);
  } catch(err) {
    setStatus(`❌ 请求失败：${err.message}`, true);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '✨ 智能生成评语';
  }
}

function setStatus(msg, isErr) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.style.color = isErr ? '#e07b54' : '#2c7a5c';
}

function copyText() {
  const text = document.getElementById('outputBox').value;
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✅ 已复制！';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 一键复制'; btn.classList.remove('copied'); }, 2000);
  });
}
</script>
</body>
</html>
